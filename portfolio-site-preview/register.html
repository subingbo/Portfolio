<!DOCTYPE html>
<!-- 视觉：Style 2 清新博客风 -->
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>注册</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body class="min-h-screen bg-[#faf8f3] text-stone-800 antialiased">
    <header class="border-b border-emerald-900/10 bg-[#faf8f3]/90 backdrop-blur-sm" data-module="site-header">
      <div class="mx-auto flex max-w-6xl flex-wrap items-center justify-between gap-4 px-5 py-5 md:px-8">
        <a href="index.html" class="font-serif text-xl font-semibold tracking-tight text-emerald-900 transition hover:text-emerald-950 focus:outline-none focus-visible:rounded-sm focus-visible:ring-2 focus-visible:ring-emerald-600/40 focus-visible:ring-offset-2 focus-visible:ring-offset-[#faf8f3]">作品集 / 博客</a>
        <nav aria-label="主导航" class="flex flex-wrap gap-6 text-sm text-stone-600">
          <a href="index.html" class="transition hover:text-emerald-800 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-600/40 focus-visible:ring-offset-2 focus-visible:ring-offset-[#faf8f3]">首页</a>
          <a href="projects.html" class="transition hover:text-emerald-800 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-600/40 focus-visible:ring-offset-2 focus-visible:ring-offset-[#faf8f3]">项目</a>
          <a href="blog.html" class="transition hover:text-emerald-800 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-600/40 focus-visible:ring-offset-2 focus-visible:ring-offset-[#faf8f3]">博客</a>
          <a href="profile.html" class="transition hover:text-emerald-800 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-600/40 focus-visible:ring-offset-2 focus-visible:ring-offset-[#faf8f3]">个人</a>
          <a href="login.html" class="transition hover:text-emerald-800 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-600/40 focus-visible:ring-offset-2 focus-visible:ring-offset-[#faf8f3]">登录</a>
        </nav>
        <div class="flex gap-5 text-sm text-stone-600">
          <a href="#" class="transition hover:text-emerald-800 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-600/40 focus-visible:ring-offset-2 focus-visible:ring-offset-[#faf8f3]">GitHub</a>
          <a href="#" class="transition hover:text-emerald-800 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-600/40 focus-visible:ring-offset-2 focus-visible:ring-offset-[#faf8f3]">LinkedIn</a>
        </div>
      </div>
    </header>

    <div class="border-t border-emerald-900/5 bg-[#f3f0e7] px-5 py-14 md:px-8 md:py-20">
      <div class="mx-auto max-w-6xl">
        <header class="mb-12 max-w-xl md:mb-16 lg:ml-2">
          <h1 class="font-serif text-5xl font-semibold leading-[1.08] tracking-tight text-stone-900 md:text-6xl">注册</h1>
          <p class="mt-6 text-base leading-relaxed text-stone-600">占位页：用于审核字段分组与说明文案。生产环境应接邮箱验证、速率限制与密码策略提示。</p>
        </header>

        <main class="max-w-xl rounded-xl border border-emerald-900/10 bg-white/90 p-8 shadow-sm lg:ml-4 md:p-10" data-page="register">
          <form class="space-y-10" action="#" method="post">
            <div class="space-y-2">
              <label for="display" class="block text-sm font-medium text-stone-700">显示名</label>
              <input
                id="display"
                name="display"
                type="text"
                autocomplete="nickname"
                class="w-full rounded-lg border border-stone-200 bg-white px-4 py-3 text-stone-900 outline-none transition placeholder:text-stone-400 focus:border-emerald-600 focus:ring-1 focus:ring-emerald-600/30"
                placeholder="用于评论展示"
              />
            </div>
            <div class="space-y-2">
              <label for="reg-email" class="block text-sm font-medium text-stone-700">邮箱</label>
              <input
                id="reg-email"
                name="email"
                type="email"
                autocomplete="email"
                class="w-full rounded-lg border border-stone-200 bg-white px-4 py-3 text-stone-900 outline-none transition placeholder:text-stone-400 focus:border-emerald-600 focus:ring-1 focus:ring-emerald-600/30"
                placeholder="you@example.dev"
              />
            </div>
            <div class="space-y-2">
              <label for="reg-password" class="block text-sm font-medium text-stone-700">密码</label>
              <input
                id="reg-password"
                name="password"
                type="password"
                autocomplete="new-password"
                class="w-full rounded-lg border border-stone-200 bg-white px-4 py-3 text-stone-900 outline-none transition placeholder:text-stone-400 focus:border-emerald-600 focus:ring-1 focus:ring-emerald-600/30"
                placeholder="最小长度等规则由后端校验"
              />
            </div>
            <p class="text-sm leading-relaxed text-stone-600">
              继续即表示你已阅读
              <a href="privacy.html" class="font-medium text-emerald-800 underline decoration-emerald-800/30 underline-offset-2 transition hover:text-emerald-900 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-600/40 focus-visible:ring-offset-2 focus-visible:ring-offset-white">隐私与日志（草案）</a>
              中的收集范围说明（占位）。
            </p>
            <button
              type="submit"
              class="rounded-lg bg-emerald-800 px-6 py-3 text-sm font-medium text-[#faf8f3] shadow-md shadow-emerald-900/10 transition hover:bg-emerald-900 hover:shadow-lg focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-600 focus-visible:ring-offset-2 focus-visible:ring-offset-white"
            >
              创建账号（静态预览）
            </button>
          </form>
          <p class="mt-12 text-sm text-stone-600">
            已有账号？
            <a href="login.html" class="font-medium text-emerald-800 transition hover:text-emerald-900 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-600/40 focus-visible:ring-offset-2 focus-visible:ring-offset-[#f3f0e7]">登录</a>
          </p>
        </main>

        <footer class="mt-16 border-t border-emerald-900/10 pt-10 text-sm text-stone-600 md:mt-20">
          <a href="index.html" class="font-medium text-emerald-800 transition hover:text-emerald-900 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-600/40 focus-visible:ring-offset-2 focus-visible:ring-offset-[#f3f0e7]">返回首页</a>
        </footer>
      </div>
    </div>
  </body>
</html>
