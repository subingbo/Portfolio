<!DOCTYPE html>
<!-- 视觉：Style 2 清新博客风 -->
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body class="min-h-screen bg-[#faf8f3] text-stone-800 antialiased">
    <header class="border-b border-emerald-900/10 bg-[#faf8f3]/90 backdrop-blur-sm" data-module="site-header">
      <div class="mx-auto flex max-w-6xl flex-wrap items-center justify-between gap-4 px-5 py-5 md:px-8">
        <a href="index.html" class="font-serif text-xl font-semibold tracking-tight text-emerald-900 transition hover:text-emerald-950 focus:outline-none focus-visible:rounded-sm focus-visible:ring-2 focus-visible:ring-emerald-600/40 focus-visible:ring-offset-2 focus-visible:ring-offset-[#faf8f3]">作品集 / 博客</a>
        <nav aria-label="主导航" class="flex flex-wrap gap-6 text-sm text-stone-600">
          <a href="index.html" class="transition hover:text-emerald-800 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-600/40 focus-visible:ring-offset-2 focus-visible:ring-offset-[#faf8f3]">首页</a>
          <a href="projects.html" class="transition hover:text-emerald-800 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-600/40 focus-visible:ring-offset-2 focus-visible:ring-offset-[#faf8f3]">项目</a>
          <a href="blog.html" class="transition hover:text-emerald-800 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-600/40 focus-visible:ring-offset-2 focus-visible:ring-offset-[#faf8f3]">博客</a>
          <a href="profile.html" class="transition hover:text-emerald-800 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-600/40 focus-visible:ring-offset-2 focus-visible:ring-offset-[#faf8f3]">个人</a>
          <span class="font-medium text-emerald-900" aria-current="page">登录</span>
        </nav>
        <div class="flex gap-5 text-sm text-stone-600">
          <a href="#" class="transition hover:text-emerald-800 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-600/40 focus-visible:ring-offset-2 focus-visible:ring-offset-[#faf8f3]">GitHub</a>
          <a href="#" class="transition hover:text-emerald-800 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-600/40 focus-visible:ring-offset-2 focus-visible:ring-offset-[#faf8f3]">LinkedIn</a>
        </div>
      </div>
    </header>

    <div class="border-t border-emerald-900/5 bg-[#eef6f0] px-5 py-14 md:px-8 md:py-20">
      <div class="mx-auto max-w-6xl">
        <header class="mb-12 max-w-xl md:mb-16 lg:ml-2">
          <h1 class="font-serif text-5xl font-semibold leading-[1.08] tracking-tight text-stone-900 md:text-6xl">登录</h1>
          <p class="mt-6 text-base leading-relaxed text-stone-600">仅用于预览表单结构。真实环境应接 OAuth2 / 会话 Cookie / CSRF 等策略，此处不实现。</p>
        </header>

        <main class="max-w-xl rounded-xl border border-emerald-900/10 bg-white/90 p-8 shadow-sm lg:ml-4 md:p-10" data-page="login">
          <form class="space-y-10" action="#" method="post">
            <div class="space-y-2">
              <label for="email" class="block text-sm font-medium text-stone-700">邮箱</label>
              <input
                id="email"
                name="email"
                type="email"
                autocomplete="username"
                class="w-full rounded-lg border border-stone-200 bg-white px-4 py-3 text-stone-900 outline-none transition placeholder:text-stone-400 focus:border-emerald-600 focus:ring-1 focus:ring-emerald-600/30"
                placeholder="you@example.dev"
              />
            </div>
            <div class="space-y-2">
              <label for="password" class="block text-sm font-medium text-stone-700">密码</label>
              <input
                id="password"
                name="password"
                type="password"
                autocomplete="current-password"
                class="w-full rounded-lg border border-stone-200 bg-white px-4 py-3 text-stone-900 outline-none transition placeholder:text-stone-400 focus:border-emerald-600 focus:ring-1 focus:ring-emerald-600/30"
                placeholder="••••••••"
              />
            </div>
            <div class="flex flex-wrap items-center gap-6 text-sm">
              <label class="inline-flex cursor-pointer items-center gap-2 text-stone-600">
                <input type="checkbox" name="remember" class="size-4 rounded border-stone-300 text-emerald-800 accent-emerald-800" />
                在此设备保留会话（占位）
              </label>
            </div>
            <div class="flex flex-wrap items-center gap-x-6 gap-y-4 pt-2">
              <button
                type="submit"
                class="rounded-lg bg-emerald-800 px-6 py-3 text-sm font-medium text-[#faf8f3] shadow-md shadow-emerald-900/10 transition hover:bg-emerald-900 hover:shadow-lg focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-600 focus-visible:ring-offset-2 focus-visible:ring-offset-[#eef6f0]"
              >
                提交（静态预览）
              </button>
              <a href="forgot-password.html" class="text-sm font-medium text-emerald-800 underline decoration-emerald-800/30 underline-offset-4 transition hover:text-emerald-900">忘记密码</a>
            </div>
          </form>
          <p class="mt-12 border-t border-stone-200 pt-10 text-sm text-stone-600">
            没有账号？
            <a href="register.html" class="font-medium text-emerald-800 transition hover:text-emerald-900">注册（预览）</a>
          </p>
        </main>

        <footer class="mt-16 border-t border-emerald-900/10 pt-10 text-sm text-stone-600 md:mt-20">
          <a href="index.html" class="font-medium text-emerald-800 transition hover:text-emerald-900">返回首页</a>
        </footer>
      </div>
    </div>
  </body>
</html>
