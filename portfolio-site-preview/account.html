<!DOCTYPE html>
<!-- 视觉：Style 2 清新博客风 -->
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>账号</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body class="min-h-screen bg-[#faf8f3] text-stone-800 antialiased">
    <header class="border-b border-emerald-900/10 bg-[#faf8f3]/90 backdrop-blur-sm" data-module="site-header">
      <div class="mx-auto flex max-w-6xl flex-wrap items-center justify-between gap-4 px-5 py-5 md:px-8">
        <a href="index.html" class="font-serif text-xl font-semibold tracking-tight text-emerald-900 transition hover:text-emerald-950 focus:outline-none focus-visible:rounded-sm focus-visible:ring-2 focus-visible:ring-emerald-600/40 focus-visible:ring-offset-2 focus-visible:ring-offset-[#faf8f3]">作品集 / 博客</a>
        <nav aria-label="主导航" class="flex flex-wrap gap-6 text-sm text-stone-600">
          <a href="index.html" class="transition hover:text-emerald-800 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-600/40 focus-visible:ring-offset-2 focus-visible:ring-offset-[#faf8f3]">首页</a>
          <a href="projects.html" class="transition hover:text-emerald-800 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-600/40 focus-visible:ring-offset-2 focus-visible:ring-offset-[#faf8f3]">项目</a>
          <a href="blog.html" class="transition hover:text-emerald-800 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-600/40 focus-visible:ring-offset-2 focus-visible:ring-offset-[#faf8f3]">博客</a>
          <a href="profile.html" class="transition hover:text-emerald-800 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-600/40 focus-visible:ring-offset-2 focus-visible:ring-offset-[#faf8f3]">个人</a>
          <a href="login.html" class="transition hover:text-emerald-800 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-600/40 focus-visible:ring-offset-2 focus-visible:ring-offset-[#faf8f3]">登录</a>
        </nav>
        <div class="flex gap-5 text-sm text-stone-600">
          <a href="#" class="transition hover:text-emerald-800 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-600/40 focus-visible:ring-offset-2 focus-visible:ring-offset-[#faf8f3]">GitHub</a>
          <a href="#" class="transition hover:text-emerald-800 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-600/40 focus-visible:ring-offset-2 focus-visible:ring-offset-[#faf8f3]">LinkedIn</a>
        </div>
      </div>
    </header>

    <div class="border-t border-emerald-900/5 bg-[#faf8f3] px-5 py-14 md:px-8 md:py-20">
      <div class="mx-auto max-w-6xl">
        <header class="mb-12 max-w-3xl md:mb-16 lg:ml-2">
          <p class="text-sm font-medium uppercase tracking-[0.2em] text-emerald-700/80">账号 · 子页</p>
          <h1 class="mt-4 font-serif text-5xl font-semibold leading-[1.08] tracking-tight text-stone-900 md:text-6xl">账号设置</h1>
          <p class="mt-6 text-base leading-relaxed text-stone-600">登录后的最小集合：显示名、邮箱可见性、注销会话。无侧边栏控制台，单列分段。</p>
        </header>

        <main class="mx-auto max-w-3xl space-y-16 lg:ml-4" data-page="account">
          <section class="rounded-xl border border-emerald-900/10 bg-white/90 p-8 shadow-sm md:p-10" aria-labelledby="acc-profile">
            <h2 id="acc-profile" class="font-serif text-2xl font-semibold text-stone-900">资料</h2>
            <form class="mt-8 max-w-xl space-y-8" action="#" method="post">
              <div class="space-y-2">
                <label for="acc-display" class="block text-sm font-medium text-stone-700">显示名</label>
                <input
                  id="acc-display"
                  type="text"
                  value="作者（占位）"
                  class="w-full rounded-lg border border-stone-200 bg-white px-4 py-3 text-stone-900 outline-none transition focus:border-emerald-600 focus:ring-1 focus:ring-emerald-600/30"
                />
              </div>
              <div class="space-y-2">
                <label for="acc-email" class="block text-sm font-medium text-stone-700">邮箱</label>
                <input id="acc-email" type="email" value="you@example.dev" readonly class="w-full cursor-not-allowed rounded-lg border border-stone-100 bg-stone-50 px-4 py-3 text-stone-500" />
                <p class="text-sm text-stone-500">变更邮箱需验证（占位说明）。</p>
              </div>
              <button
                type="submit"
                class="rounded-lg bg-emerald-800 px-6 py-3 text-sm font-medium text-[#faf8f3] shadow-md shadow-emerald-900/10 transition hover:bg-emerald-900 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-600 focus-visible:ring-offset-2 focus-visible:ring-offset-white"
              >
                保存（静态）
              </button>
            </form>
          </section>

          <section class="rounded-xl border border-emerald-900/10 bg-[#f3f0e7]/80 p-8 shadow-sm md:p-10" aria-labelledby="acc-danger">
            <h2 id="acc-danger" class="font-serif text-2xl font-semibold text-stone-900">会话</h2>
            <ul class="mt-8 m-0 list-none space-y-6 border-y border-stone-200 py-8 text-sm text-stone-600">
              <li class="flex flex-wrap items-baseline justify-between gap-4">
                <span>本浏览器 · 当前会话</span>
                <span class="tabular-nums text-emerald-800">活跃</span>
              </li>
              <li class="flex flex-wrap items-baseline justify-between gap-4">
                <span>其它设备 · 占位</span>
                <button
                  type="button"
                  class="font-medium text-emerald-800 underline decoration-emerald-800/30 underline-offset-2 transition hover:text-emerald-900 focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-600/40 focus-visible:ring-offset-2 focus-visible:ring-offset-[#f3f0e7]"
                >
                  撤销
                </button>
              </li>
            </ul>
            <p class="mt-10 text-sm text-stone-600">
              需要离开？
              <a href="login.html" class="font-medium text-emerald-800 transition hover:text-emerald-900">退出登录（预览链接）</a>
            </p>
          </section>
        </main>
      </div>
    </div>
  </body>
</html>
